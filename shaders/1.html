<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion GPU Playground Recreation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec2 position;
        varying vec2 v_uv;
        void main() {
            v_uv = position * 0.5 + 0.5;
            gl_Position = vec4(position, 0.0, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision highp float;
        varying vec2 v_uv;
        uniform float u_time;
        uniform vec2 u_resolution;

        // Recreating the WGSL-style math in GLSL
        void main() {
            vec2 r = u_resolution;
            // Line 8: let p = vec2f(uv.x * r.x + 0.5, uv.y * r.y + 0.5);
            vec2 p = v_uv * r + 0.5;

            vec3 h = vec3(0.0);
            vec3 c = vec3(1.0);
            float A = 0.0;
            float l = 0.0;
            float a = 0.0;

            // Line 16: for (var i = 0.6; i > 0.1; i -= 0.1)
            for (float i = 0.6; i > 0.05; i -= 0.1) {
                // Line 17-19: Rotation and oscillation logic
                a = (u_time + i) * 4.0;
                a -= sin(a);
                a -= sin(a);

                // Line 21: let t = cos(a / 4.0 + vec2f(0.0, 1.0));
                vec2 t = cos(a / 4.0 + vec2(0.0, 1.0));
                // Line 22: mat2x2f(vec2f(t.x, t.y), vec2f(-t.y, t.x))
                mat2 R = mat2(t.x, t.y, -t.y, t.x);

                // Line 24: var u = (p * 2.0 - r) / r.y / 0.5;
                vec2 u = (p * 2.0 - r) / r.y / 0.5;
                
                // Line 25-26: Clamped box distance field logic
                // Using transpose(R) as shown in the original code
                mat2 Rt = mat2(R[0][0], R[1][0], R[0][1], R[1][1]);
                vec2 ur = Rt * u;
                
                // The image shows u -= R * clamp(...) pattern for distance fields
                u -= R * clamp(ur, -vec2(i), vec2(i));

                // Line 28: l = max(length(u), 0.1);
                l = max(length(u), 0.1);
                
                // Line 29: A = min((l - 0.1) * r.y / 5.0, 1.0);
                A = min((l - 0.1) * r.y / 5.0, 1.0);
                
                // Line 30: h = sin(i * 10.0 + a / 3.0 + vec3f(1.0, 3.0, 5.0)) / 5.0 + 0.8;
                h = sin(i * 10.0 + a / 3.0 + vec3(1.0, 3.0, 5.0)) / 5.0 + 0.8;
                
                // Line 31: Complex color mixing and shadowing
                c = mix(h, c, A) * mix(vec3(1.0), h + A * u.y / l / 2.0, 0.1 / l);
            }

            // Line 34: return vec4f(tanh(c * c), 1.0);
            // Recreating tanh approximation for GLSL
            vec3 c2 = c * c;
            vec3 result = (exp(c2) - exp(-c2)) / (exp(c2) + exp(-c2));
            gl_FragColor = vec4(result, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            console.error('WebGL not supported');
        }

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vsSource = document.getElementById('vertexShader').text;
        const fsSource = document.getElementById('fragmentShader').text;

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]), gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');

        function render(time) {
            time *= 0.001; // Convert to seconds

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);

            gl.clearColor(0.95, 0.95, 0.95, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.useProgram(program);

            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            gl.uniform1f(timeLocation, time);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
