<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Pulse - Fluid Edition</title>
    <style>
        :root {
            --mango-core: #ff5e00;
            --mango-skin: #ffb400;
            --ui-glass: rgba(15, 10, 5, 0.7);
            --accent: #ffd900;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0805;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #eee;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        .top-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, var(--mango-core), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            margin: 5px 0 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        #controls {
            pointer-events: auto;
            width: 280px;
            background: var(--ui-glass);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-end;
        }

        .control-item {
            margin-bottom: 20px;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        .control-item label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 10px;
            color: var(--mango-skin);
            font-weight: 600;
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--mango-core);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.5);
        }

        .stats {
            font-family: monospace;
            font-size: 10px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="glCanvas"></canvas>
        
        <div id="ui-overlay">
            <div class="top-meta">
                <div class="brand">
                    <h1>Mango Pulse</h1>
                    <p>Viscous Flow Lab</p>
                </div>
                <div class="stats" id="fps">FPS: 60</div>
            </div>

            <div id="controls">
                <div class="control-item">
                    <label>Viscosity <span>Flow</span></label>
                    <input type="range" id="val-viscosity" min="0.1" max="2.0" step="0.01" value="0.8">
                </div>
                <div class="control-item">
                    <label>Pulp Density <span>Grain</span></label>
                    <input type="range" id="val-grain" min="0.0" max="1.0" step="0.01" value="0.3">
                </div>
                <div class="control-item">
                    <label>Heat Index <span>Vibrancy</span></label>
                    <input type="range" id="val-heat" min="0.5" max="3.0" step="0.1" value="1.2">
                </div>
                <div class="control-item">
                    <label>Refraction <span>Depth</span></label>
                    <input type="range" id="val-depth" min="0.0" max="1.0" step="0.01" value="0.4">
                </div>
            </div>
        </div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec2 position;
        varying vec2 v_uv;
        void main() {
            v_uv = position * 0.5 + 0.5;
            gl_Position = vec4(position, 0.0, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision highp float;
        varying vec2 v_uv;
        uniform float u_time;
        uniform vec2 u_res;
        
        // Uniforms from UI
        uniform float u_viscosity;
        uniform float u_grain;
        uniform float u_heat;
        uniform float u_depth;

        // Hash for noise
        vec3 hash(vec3 p) {
            p = vec3(dot(p, vec3(127.1, 311.7, 74.7)),
                     dot(p, vec3(269.5, 183.3, 246.1)),
                     dot(p, vec3(113.5, 271.9, 124.6)));
            return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
        }

        // Simplex Noise
        float noise(vec3 p) {
            vec3 i = floor(p);
            vec3 f = fract(p);
            vec3 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(mix(dot(hash(i + vec3(0, 0, 0)), f - vec3(0, 0, 0)),
                               dot(hash(i + vec3(1, 0, 0)), f - vec3(1, 0, 0)), u.x),
                           mix(dot(hash(i + vec3(0, 1, 0)), f - vec3(0, 1, 0)),
                               dot(hash(i + vec3(1, 1, 0)), f - vec3(1, 1, 0)), u.x), u.y),
                       mix(mix(dot(hash(i + vec3(0, 0, 1)), f - vec3(0, 0, 1)),
                               dot(hash(i + vec3(1, 0, 1)), f - vec3(1, 0, 1)), u.x),
                           mix(dot(hash(i + vec3(0, 1, 1)), f - vec3(0, 1, 1)),
                               dot(hash(i + vec3(1, 1, 1)), f - vec3(1, 1, 1)), u.x), u.y), u.z);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy * 2.0 - u_res.xy) / min(u_res.x, u_res.y);
            float time = u_time * 0.4;

            // Coordinate distortion (the "viscous" flow)
            for(float i = 1.0; i < 4.0; i++) {
                uv.x += (0.3 / i) * sin(i * 3.0 * uv.y + time * u_viscosity + i);
                uv.y += (0.3 / i) * cos(i * 3.0 * uv.x + time * u_viscosity + i);
            }

            // Create "Liquid Core" distance field
            float d = length(uv);
            float core = smoothstep(0.8, 0.0, d);
            
            // Texture / Grain logic
            float n = noise(vec3(uv * 4.0, time * 0.5));
            float n2 = noise(vec3(uv * 12.0, time));
            float pulp = mix(n, n2, u_grain);

            // Color palette (Mango themes)
            vec3 colorA = vec3(1.0, 0.3, 0.0); // Deep Orange
            vec3 colorB = vec3(1.0, 0.8, 0.1); // Bright Gold
            vec3 colorC = vec3(0.1, 0.03, 0.0); // Dark Background

            // Combine flow and density
            float blend = smoothstep(-0.5, 0.5, n);
            vec3 liquid = mix(colorA, colorB, blend);
            liquid *= (1.0 + pulp * 0.4) * u_heat;

            // Refraction logic (using the gradient of noise)
            vec2 offset = vec2(noise(vec3(uv + 0.01, time)), noise(vec3(uv.y + 0.01, uv.x, time)));
            float glass = 1.0 - smoothstep(0.1, 0.5, length(offset) * u_depth);
            
            // Final shading
            vec3 final = mix(colorC, liquid, core);
            final += glass * 0.15 * colorB; // Specular highlights
            
            // Vignette
            final *= 1.0 - length(v_uv - 0.5) * 1.5;

            gl_FragColor = vec4(final, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');
        const fpsDisplay = document.getElementById('fps');

        if (!gl) {
            document.body.innerHTML = '<div style="padding: 50px;">WebGL required to view this experiment.</div>';
        }

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vsSource = document.getElementById('vertexShader').text;
        const fsSource = document.getElementById('fragmentShader').text;

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const posLoc = gl.getAttribLocation(program, 'position');
        const timeLoc = gl.getUniformLocation(program, 'u_time');
        const resLoc = gl.getUniformLocation(program, 'u_res');
        const viscLoc = gl.getUniformLocation(program, 'u_viscosity');
        const grainLoc = gl.getUniformLocation(program, 'u_grain');
        const heatLoc = gl.getUniformLocation(program, 'u_heat');
        const depthLoc = gl.getUniformLocation(program, 'u_depth');

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resize);
        resize();

        let frameCount = 0;
        let lastTime = 0;

        function animate(now) {
            frameCount++;
            if (now - lastTime >= 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = now;
            }

            gl.useProgram(program);
            gl.enableVertexAttribArray(posLoc);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

            gl.uniform1f(timeLoc, now * 0.001);
            gl.uniform2f(resLoc, canvas.width, canvas.height);
            gl.uniform1f(viscLoc, parseFloat(document.getElementById('val-viscosity').value));
            gl.uniform1f(grainLoc, parseFloat(document.getElementById('val-grain').value));
            gl.uniform1f(heatLoc, parseFloat(document.getElementById('val-heat').value));
            gl.uniform1f(depthLoc, parseFloat(document.getElementById('val-depth').value));

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
