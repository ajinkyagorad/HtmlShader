<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion GPU Playground Recreation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec2 position;
        varying vec2 v_uv;
        void main() {
            v_uv = position * 0.5 + 0.5;
            gl_Position = vec4(position, 0.0, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision highp float;
        varying vec2 v_uv;
        uniform float u_time;
        uniform vec2 u_resolution;

        void main() {
            vec2 r = u_resolution;
            // Base normalized coordinates
            vec2 p = v_uv * r + 0.5;
            vec2 global_u = (p * 2.0 - r) / r.y / 0.5;

            // Inter-dimensional space warping (fluid distortion of the void)
            vec2 warped_u = global_u;
            warped_u += vec2(
                sin(u_time * 0.25 + global_u.y * 2.0),
                cos(u_time * 0.2 + global_u.x * 2.0)
            ) * 0.3;

            // Start with a bright white/grey void canvas
            vec3 final_c = vec3(1.0); 

            // Generate multiple distinct patterns emerging from the void
            for(int j = 0; j < 4; j++) {
                float fj = float(j);
                
                // Generative randomness seeds per entity
                float rand1 = fract(sin(fj * 12.9898 + 1.0) * 43758.5453);
                float rand2 = fract(sin(fj * 39.346 + 2.0) * 43758.5453);
                
                // Cycle of appearing from and fading back into the void
                float appear_cycle = sin(u_time * (0.2 + rand1 * 0.15) + fj * 2.14);
                float size_mod = smoothstep(-0.2, 0.8, appear_cycle); 
                
                // Skip rendering if fully swallowed by the void to save performance
                if (size_mod < 0.01) continue; 

                // Drift path across random morphed places
                vec2 offset = vec2(
                    sin(u_time * (0.15 + rand1 * 0.1) + fj * 3.1),
                    cos(u_time * (0.11 + rand2 * 0.1) + fj * 1.7)
                ) * (1.2 + rand2 * 1.5);
                
                vec2 u = warped_u + offset;
                
                // Scale object based on its emergence cycle (appearing from a point)
                u /= (0.1 + size_mod * 1.2); 
                
                // Localized inter-dimensional twist (vortex effect)
                float twist = sin(u_time * 0.15 + fj) * length(u) * 0.8;
                mat2 twistM = mat2(cos(twist), sin(twist), -sin(twist), cos(twist));
                u = twistM * u;

                vec3 h = vec3(0.0);
                vec3 c = vec3(1.0);
                float A = 0.0;
                float l = 0.0;
                float a = 0.0;

                // Build the cloud layers
                for (float i = 0.6; i > 0.05; i -= 0.1) {
                    // Unique rotation speeds and wobbles per entity
                    a = (u_time * (0.5 + rand1 * 1.5) + i) * 4.0;
                    a -= sin(a);
                    a -= sin(a);

                    vec2 t = cos(a / 4.0 + vec2(0.0, 1.0));
                    mat2 R = mat2(t.x, t.y, -t.y, t.x);

                    mat2 Rt = mat2(R[0][0], R[1][0], R[0][1], R[1][1]);
                    vec2 ur = Rt * u;
                    
                    float angle = atan(ur.y, ur.x);
                    
                    // Different morphological characteristics (bump amounts/frequencies)
                    float bump_speed1 = 0.5 + rand1;
                    float bump_speed2 = 0.8 + rand2;
                    float bump_freq1 = 2.0 + floor(rand1 * 4.0);
                    float bump_freq2 = 3.0 + floor(rand2 * 5.0);
                    
                    float bump = i * 0.3 * abs(sin(angle * bump_freq1 + u_time * bump_speed1)) + 
                                 i * 0.15 * abs(cos(angle * bump_freq2 - u_time * bump_speed2));
                                 
                    float r_cloud = i * 0.5 + bump;
                    float len_ur = length(ur);
                    
                    if (len_ur > r_cloud) {
                        vec2 boundary_pt = (ur / len_ur) * r_cloud;
                        u -= R * boundary_pt;
                    } else {
                        u = vec2(0.0);
                    }

                    l = max(length(u), 0.1);
                    A = min((l - 0.1) * r.y / 5.0, 1.0);
                    
                    // Distinct, randomized neon-pastel color offsets
                    vec3 colorOffset = vec3(1.0 + rand1 * 3.0, 3.0 + rand2 * 3.0, 5.0 + rand1 * 5.0);
                    h = sin(i * 10.0 + a / 3.0 + colorOffset) / 5.0 + 0.8;
                    
                    c = mix(h, c, A) * mix(vec3(1.0), h + A * u.y / l / 2.0, 0.1 / l);
                }
                
                // Subtractive blend: Multiply entities together, fading out as they retreat into the void
                final_c *= mix(vec3(1.0), c, size_mod);
            }

            // Final contrast/glow mapping
            vec3 c2 = final_c * final_c;
            vec3 result = (exp(c2) - exp(-c2)) / (exp(c2) + exp(-c2));
            gl_FragColor = vec4(result, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');

        if (!gl) {
            console.error('WebGL not supported');
        }

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vsSource = document.getElementById('vertexShader').text;
        const fsSource = document.getElementById('fragmentShader').text;

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]), gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');

        function render(time) {
            time *= 0.001; // Convert to seconds

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);

            gl.clearColor(0.95, 0.95, 0.95, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.useProgram(program);

            gl.enableVertexAttribArray(positionLocation);
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            gl.uniform1f(timeLocation, time);
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
